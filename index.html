<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snorlax Overlay</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: transparent;
  }

  #stage {
    position: relative;
    width: 720px;
    height: 1280px;
  }

  .character {
    position: absolute;
    bottom: 300px;
    right: 10%;
    transform: translateX(-50%);
    width: 350px;
  }

  #idle {
    z-index: 1;
  }

  .action {
    display: none;
    z-index: 2;
  }
</style>
</head>

<body>

<div id="stage">

  <!-- IDLE -->
  <img id="idle" class="character" src="Snorlax Sleeping.gif">

  <!-- CHAT ACTIONS -->
  <img id="wave" class="character action" src="Snorlax Waving.gif">
  <img id="poke" class="character action" src="Snorlax poking.gif">
  <img id="pet" class="character action" src="Snorlax Pet.gif">
  <img id="feed" class="character action" src="Snorlax Feed Me.gif">

  <!-- GIFT ACTIONS -->
  <img id="heart" class="character action" src="Snorlax Heart Me.gif">
  <img id="hyper" class="character action" src="Snorlax Hyperbeam.gif">

</div>

<script>
let isPlaying = false;

function playAnim(id, duration = 2000) {
  if (isPlaying) return;

  isPlaying = true;

  const el = document.getElementById(id);
  el.style.display = "block";

  setTimeout(() => {
    el.style.display = "none";
    isPlaying = false;
  }, duration);
}

// CHAT COMMANDS
function playHello() { playAnim("wave", 2000); }
function playPoke() { playAnim("poke", 1500); }
function playPet() { playAnim("pet", 2000); }
function playFeed() { playAnim("feed", 2500); }

// GIFT TRIGGERS
function playHeart() { playAnim("heart", 2500); }
function playHyper() { playAnim("hyper", 4000); }
</script>

</body>
</html>
